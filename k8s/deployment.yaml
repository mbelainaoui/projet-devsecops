apiVersion: apps/v1
kind: Deployment
metadata:
  name: projet-devsecops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projet-devsecops
  template:
    metadata:
      labels:
        app: projet-devsecops
    spec:
      containers:
        - name: projet-devsecops
          image: projet-devsecops:latest
          ports:
            - containerPort: 3000
          securityContext:
            runAsUser: 0
---
apiVersion: v1
kind: Service
metadata:
  name: projet-devsecops-service
spec:
  selector:
    app: projet-devsecops
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
